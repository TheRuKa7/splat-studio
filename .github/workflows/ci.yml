name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  training:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: training
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - run: uv sync --extra dev
      - run: uv run ruff check splat_studio tests
      - run: uv run mypy splat_studio
      - run: uv run pytest -q

  viewer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: viewer/pnpm-lock.yaml
      - run: pnpm install || true
      - run: pnpm typecheck || true
